<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:radial-gradient(circle at top,#050b1e,#000);
  color:#eaeaff;
  overflow-x:hidden;
}

.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 14px;
  height:180px;
  background:
    linear-gradient(to bottom,rgba(0,0,0,0.15),rgba(0,0,0,0.95)),
    url('https://c4.wallpaperflare.com/wallpaper/367/536/906/anime-anime-girls-vocaloid-hatsune-miku-wallpaper-preview.jpg') no-repeat center;
  background-size:cover;
}
.movie-card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.35s ease;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.15);
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

/* image */
.movie-card img{
  width:100%;
  height:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  transition:0.4s ease;
}

/* hover zoom */
.movie-card:hover img{
  transform:scale(1.1);
  filter:brightness(0.6);
}

/* overlay layer */
.movie-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
  opacity:0;
  transition:0.3s;
}

.movie-card:hover::after{
  opacity:1;
}

/* play icon */
.movie-card::before{
  content:"▶";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:26px;
  color:#00ffff;
  opacity:0;
  transition:0.3s;
  text-shadow:0 0 15px #00ffff;
}

.movie-card:hover::before{
  opacity:1;
}
.logo{
  font-size:40px;
  font-weight:800;
  cursor:pointer;
}
.logo .cine{color:#00ffff;text-shadow:0 0 12px #00ffff;}
.logo .lanka{color:#ffffff;}

.hero{
  margin:12px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,#0d1b3d,#020617);
  box-shadow:0 0 25px rgba(0,255,255,0.25);
}
.hero h3{color:#00ffff;}

.movie-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  padding:12px;
}

@media(min-width:1024px){
  .movie-grid{grid-template-columns:repeat(5,1fr)}
}
@media(min-width:1400px){
  .movie-grid{grid-template-columns:repeat(6,1fr)}
}

.movie-card{
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 0 18px rgba(0,0,0,0.7);
}

.movie-card:hover{
  transform:scale(1.06);
  box-shadow:0 0 18px #00ffff,0 0 28px rgba(138,43,226,0.8);
}

.movie-card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}

.site-footer{
  padding:14px;
  text-align:center;
  font-size:13px;
  color:#8fbfff;
}
</style>

const sectionTitle = document.getElementById("sectionTitle");

function render(){
  movieGrid.innerHTML = "";

  movies.forEach(m=>{
    movieGrid.innerHTML += `
      <div class="movie-card" onclick="location.href='${m.link}'">
        <img src="${m.image}" alt="${m.title}">
      </div>
    `;
  });
}

function goHome(){
  sectionTitle.innerText = "Recently Added";
  render();
}
