<!DOCTYPE html>

<style>
/* BODY */
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?auto=format&fit=crop&w=1500&q=80');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  overflow-x:hidden;
}

/* HEADER - GLASS EFFECT */
header{
  margin:2vh auto;
  width:90%;
  max-width:600px;
  padding:2vh 1.5vw;
  text-align:center;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px) saturate(180%);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 10px 30px rgba(0,0,0,0.8);
  transform:perspective(800px) rotateX(5deg);
  position:relative;
}

/* HEADER LIGHT REFLECTION */
header::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  border-radius:20px;
  background:linear-gradient(to bottom,rgba(255,255,255,0.2),transparent);
  pointer-events:none;
}

/* LOGO */
header img{
  width:12vw;
  max-width:70px;
  height:auto;
  margin-bottom:1vh;
  filter:drop-shadow(0 0 10px #00f5ff);
}

/* HEADER TITLE */
header h1{
  font-family:'Orbitron', sans-serif;
  font-size:4vw;
  max-font-size:28px;
  background:linear-gradient(45deg,#00f5ff,#ff00cc,#00ff88);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glow 4s infinite linear;
  margin:0.5vh 0;
}

@keyframes glow{
  0%,100%{opacity:0.8;}
  50%{opacity:1;}
}

/* NAV BUTTONS */
.nav-buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:1vw;
  margin-top:2vh;
}

.nav-buttons a{
  padding:1vh 2vw;
  border-radius:25px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
  font-size:3vw;
  max-font-size:16px;
}

/* VIDEO & MOVIE HIGHLIGHT */
.nav-buttons a:nth-child(4),
.nav-buttons a:nth-child(5){
  border-color:#ff0000;
  box-shadow:0 0 10px #ff0000;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 10px #ff0000;}
  50%{box-shadow:0 0 25px #ff3d00;}
}

.nav-buttons a:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 0 12px currentColor;
}

/* SECTIONS */
section{
  padding:5vh 3vw;
  text-align:center;
}

section h2{
  font-size:5vw;
  max-font-size:28px;
  margin-bottom:1vh;
  color:#00f5ff;
  text-shadow:0 0 10px #00f5ff;
}

section p{
  font-size:3.5vw;
  max-font-size:16px;
  line-height:1.5;
}

/* FOOTER */
footer{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:3vh 1.5vw;
  border-top:1px solid rgba(255,255,255,0.1);
  box-sizing:border-box;
}

footer img{
  width:10vw;
  max-width:50px;
  height:auto;
  filter:drop-shadow(0 0 10px #00f5ff);
  margin-bottom:1vh;
}

.footer-links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:3vw;
  margin-bottom:1vh;
}

.footer-links a{
  color:#aaa;
  text-decoration:none;
  font-size:3.5vw;
  max-font-size:14px;
  transition:0.3s;
}

.footer-links a:hover{
  color:white;
}

.copy{
  font-size:3vw;
  max-font-size:13px;
  opacity:0.6;
  text-align:center;
}

/* TOP BUTTON */
#topBtn{
  position:fixed;
  bottom:15px;
  right:15px;
  display:none;
  padding:10px;
  border:none;
  border-radius:50%;
  background:#00f5ff;
  cursor:pointer;
  transition:0.3s;
}
#topBtn:hover{
  background:#fff;
  color:#00f5ff;
}

/* RESPONSIVE ADJUSTMENTS */
@media(max-width:600px){
  header h1{font-size:6vw;}
  header img{width:18vw; max-width:60px;}
  .nav-buttons a{font-size:4vw; padding:1vh 2vw;}
  section h2{font-size:7vw;}
  section p{font-size:4vw;}
  footer img{width:15vw;}
  .footer-links a{font-size:4vw;}
  .copy{font-size:4vw;}
}
</style>
</head>
